<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Breaking News</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
  --green:#3fb950;--red:#f85149;--orange:#d29922
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .4s}
.dot.on{background:var(--green)}
.mute{background:none;border:none;cursor:pointer;font-size:20px;padding:2px 4px;line-height:1;-webkit-tap-highlight-color:transparent;color:var(--text)}

/* 3-column layout with collapsible sidebar */
.layout{display:grid;grid-template-columns:280px 1fr 1fr;flex:1;min-height:0;transition:grid-template-columns .2s}
.layout.collapsed{grid-template-columns:24px 1fr 1fr}
.layout.collapsed .sidebar{display:none}
.layout.collapsed .sb-expand{display:block}

@media(max-width:1000px){
  .layout{grid-template-columns:24px 1fr 1fr}
  .layout .sidebar{display:none}
  .sb-expand{display:block}
}
@media(max-width:700px){
  body{height:auto;overflow:auto}
  .layout,.layout.collapsed{grid-template-columns:1fr;height:auto}
  .layout .sidebar{display:none}
  .sb-expand{display:none !important}
  .feed{overflow:visible;height:auto;min-height:300px}
}

/* Sidebar collapse/expand controls */
.sb-collapse{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:11px;padding:4px 10px;width:100%;text-align:left;-webkit-tap-highlight-color:transparent}
.sb-collapse:hover{color:var(--text);border-color:var(--accent)}
.sb-expand{display:none;background:var(--surface);border-right:1px solid var(--border);writing-mode:vertical-rl;text-align:center;cursor:pointer;padding:8px 4px;font-size:14px;color:var(--muted);user-select:none}
.sb-expand:hover{color:var(--text);background:var(--surface2)}
.layout.collapsed .sb-expand{display:block}

.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.feed{overflow-y:auto;padding:14px;display:flex;flex-direction:column}
.label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.irow{display:flex;gap:6px}
input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;min-width:0;-webkit-appearance:none}
input:focus{border-color:var(--accent)}
.btn{background:#1f6feb;color:#fff;border:1px solid #1f6feb;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:active{background:#388bfd}
.btn:disabled{opacity:.6}
.err{color:var(--red);font-size:12px;margin-top:5px;display:none}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.src{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.src.err-state{border-color:rgba(248,81,73,.35)}
.src-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.src-name{font-weight:600;font-size:13px;word-break:break-word;line-height:1.3}
.del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:0;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.del:hover{color:var(--red)}
.badges{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.badge.rss{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.badge.twitter{background:rgba(88,166,255,.15);color:var(--accent);border:1px solid rgba(88,166,255,.3)}
.badge.error{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.badge.stale{background:rgba(210,153,34,.15);color:var(--orange);border:1px solid rgba(210,153,34,.3)}
.src-meta{font-size:11px;color:var(--muted);margin-top:4px}
.src-errmsg{font-size:11px;color:var(--red);margin-top:3px;word-break:break-word}

/* Column headers */
.col-header{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;margin-bottom:10px;border-left:3px solid var(--accent);background:var(--surface);border-radius:4px;flex-shrink:0}

/* Article lists */
.art-list{display:flex;flex-direction:column;gap:7px}
.art{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;animation:fi .25s ease-out;transition:border-color .15s}
.art:hover{border-color:rgba(88,166,255,.5)}
@keyframes fi{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.art-link{color:var(--text);text-decoration:none;font-weight:500;font-size:14px;line-height:1.4;display:block;margin-bottom:6px}
.art-link:hover{color:var(--accent)}
.art-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.art-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.art-time{font-size:11px;color:var(--muted);line-height:1.4}
.art-desc{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;color:var(--muted);padding:48px 16px}
.empty-i{font-size:36px;margin-bottom:8px}
footer{background:var(--surface);border-top:1px solid var(--border);padding:7px 16px;display:flex;justify-content:space-between;font-size:12px;color:var(--muted);flex-shrink:0}
</style>
</head>
<body>
<div id="audioModal" style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 28px;text-align:center;max-width:340px;width:90%">
    <div style="font-size:40px;margin-bottom:12px">📰</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px">Breaking News Dashboard</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5">Tap below to enable live sound alerts and notifications for new articles.</div>
    <button id="audioModalBtn" style="background:#1f6feb;color:#fff;border:none;border-radius:8px;padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent">🔔 Enable Alerts</button>
  </div>
</div>
<header>
  <h1><span class="dot" id="dot"></span>Breaking News</h1>
  <button class="mute" id="muteBtn" title="Toggle sound alerts">🔔</button>
</header>

<div class="layout" id="layout">
  <div class="sb-expand" id="sbExpand" title="Expand sidebar">◂</div>
  <aside class="sidebar" id="sidebar">
    <button class="sb-collapse" id="toggleSidebar" title="Collapse sidebar">▸ Hide</button>
    <div style="display:none">
      <div class="label">Add Source</div>
      <div class="irow">
        <input id="urlIn" type="text" placeholder="RSS URL or x.com/username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
        <button class="btn" id="addBtn">Add</button>
      </div>
      <div class="err" id="addErr"></div>
    </div>
    <div>
      <div class="label">Sources (<span id="srcCount">0</span>)</div>
      <div id="srcList"></div>
    </div>
  </aside>

  <section class="feed" id="col-twitter">
    <div class="col-header">🐦 @Wario64 — Twitter via Nitter</div>
    <div class="art-list" id="arts-twitter">
      <div class="empty"><div class="empty-i">🐦</div>Waiting for tweets...</div>
    </div>
  </section>

  <section class="feed" id="col-rss">
    <div class="col-header">📰 GamesRadar — RSS + HTML</div>
    <div class="art-list" id="arts-rss">
      <div class="empty"><div class="empty-i">📰</div>Waiting for articles...</div>
    </div>
  </section>
</div>

<footer>
  <span id="artCount">0 articles</span>
  <span id="lastUp">—</span>
</footer>

<script>
let muted=false,wsDelay=1000,ws,audioCtx,totalTwitter=0,totalRss=0;
const palette=['#58a6ff','#3fb950','#d29922','#bc8cff','#fa7970','#79c0ff','#ffa657'];
const cmap={};let ci=0;
function getColor(n){if(!cmap[n])cmap[n]=palette[ci++%palette.length];return cmap[n];}

// Pre-register known source colors for consistency
getColor('GamesRadar');
getColor('@Wario64');

document.getElementById('muteBtn').onclick=()=>{
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔕':'🔔';
};

// Sidebar toggle
document.getElementById('toggleSidebar').onclick=()=>{
  document.getElementById('layout').classList.add('collapsed');
};
document.getElementById('sbExpand').onclick=()=>{
  document.getElementById('layout').classList.remove('collapsed');
};

// Audio init via modal tap (required by browsers for sound to work)
function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const buf=audioCtx.createBuffer(1,1,22050);
    const src=audioCtx.createBufferSource();
    src.buffer=buf;src.connect(audioCtx.destination);src.start(0);
    console.log('[audio] Context initialized via user gesture');
  }catch(e){console.warn('[audio] Init failed:',e);}
}
document.getElementById('audioModalBtn').onclick=function(){
  initAudio();
  setTimeout(chime,100);
  if(typeof Notification!=='undefined'&&Notification.permission!=='granted'){
    Notification.requestPermission().then(p=>console.log('[notif] Permission:',p));
  }
  document.getElementById('audioModal').style.display='none';
};

function chime(){
  if(muted)return;
  try{
    if(!audioCtx){
      try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
    }
    if(audioCtx.state==='suspended')audioCtx.resume();
    const t=audioCtx.currentTime;
    const o1=audioCtx.createOscillator(),g1=audioCtx.createGain();
    o1.connect(g1);g1.connect(audioCtx.destination);
    o1.type='sine';
    o1.frequency.setValueAtTime(880,t);
    g1.gain.setValueAtTime(0.5,t);
    g1.gain.exponentialRampToValueAtTime(0.01,t+0.3);
    o1.start(t);o1.stop(t+0.3);
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.connect(g2);g2.connect(audioCtx.destination);
    o2.type='sine';
    o2.frequency.setValueAtTime(1175,t+0.15);
    g2.gain.setValueAtTime(0.5,t+0.15);
    g2.gain.exponentialRampToValueAtTime(0.01,t+0.5);
    o2.start(t+0.15);o2.stop(t+0.5);
  }catch(e){console.warn('[chime]',e);}
}

if(typeof Notification!=='undefined'&&Notification.permission!=='granted'){
  document.addEventListener('click',function askNotif(){
    if(Notification.permission!=='granted'){
      Notification.requestPermission().then(p=>{
        console.log('[notif] Permission:',p);
        if(p==='granted')document.removeEventListener('click',askNotif);
      });
    }
  });
}
console.log('[notif] Current permission:',typeof Notification!=='undefined'?Notification.permission:'not supported');
function notify(title,body){
  const perm = typeof Notification!=='undefined' ? Notification.permission : 'unsupported';
  console.log('[notify] called, permission='+perm, 'title='+title);
  document.getElementById('lastUp').textContent='Notif perm: '+perm;
  if(perm==='granted'){
    try{
      const n=new Notification('📰 '+title,{body});
      console.log('[notify] Notification created:', n);
    }catch(e){console.error('[notify] Error:',e);}
  }
}

function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host);
  ws.onopen=()=>{document.getElementById('dot').classList.add('on');wsDelay=1000;};
  ws.onclose=()=>{
    document.getElementById('dot').classList.remove('on');
    setTimeout(()=>{wsDelay=Math.min(wsDelay*2,30000);connectWS();},wsDelay);
  };
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==='new_articles'&&m.articles&&m.articles.length){
      const twitterArts=m.articles.filter(a=>a.feed_type==='twitter');
      const rssArts=m.articles.filter(a=>a.feed_type==='rss'||!a.feed_type);
      if(twitterArts.length){prependToCol('arts-twitter',twitterArts);totalTwitter+=twitterArts.length;}
      if(rssArts.length){prependToCol('arts-rss',rssArts);totalRss+=rssArts.length;}
      updateTotalCount();
      chime();
      notify(m.articles[0].title||'New article',m.articles[0].source_title||'');
      document.getElementById('lastUp').textContent='Updated '+new Date().toLocaleTimeString();
    }else if(m.type==='source_added'||m.type==='source_deleted'){
      loadSrcs();
      if(m.type==='source_deleted'){loadArtsTwitter();loadArtsRSS();}
    }
  };
}

function updateTotalCount(){
  document.getElementById('artCount').textContent=(totalTwitter+totalRss)+' articles';
}

async function loadSrcs(){
  const r=await fetch('/api/sources');
  const srcs=await r.json();
  document.getElementById('srcCount').textContent=srcs.length;
  const el=document.getElementById('srcList');
  if(!srcs.length){el.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:12px">No sources yet</div>';return;}
  srcs.forEach(s=>getColor(s.title||s.url));
  el.innerHTML=srcs.map(s=>{
    const isErr=s.status==='error';
    const lp=s.last_polled_at?relTime(new Date(s.last_polled_at.endsWith('Z')?s.last_polled_at:s.last_polled_at+' UTC')):'never';
    return `<div class="src${isErr?' err-state':''}">
      <div class="src-top">
        <div>
          <div class="src-name">${esc(s.title||s.url)}</div>
          <div class="badges">
            <span class="badge ${s.feed_type||'rss'}">${(s.feed_type||'rss').toUpperCase()}</span>
            ${isErr?'<span class="badge error">ERROR</span>':''}${s.status==='stale'?'<span class="badge stale">STALE</span>':''}
          </div>
        </div>
      </div>
      <div class="src-meta">${s.article_count||0} articles · ${lp}</div>
      ${isErr&&s.error_message?`<div class="src-errmsg">${esc(s.error_message)}</div>`:''}
    </div>`;
  }).join('');
}

async function loadArtsTwitter(){
  try{
    const r=await fetch('/api/articles?feed_type=twitter&limit=50');
    const d=await r.json();
    totalTwitter=d.total||0;
    const el=document.getElementById('arts-twitter');
    const arts=d.articles||[];
    if(!arts.length){el.innerHTML='<div class="empty"><div class="empty-i">🐦</div>Waiting for tweets...</div>';return;}
    el.innerHTML=arts.map(artCardHTML).join('');
    updateTotalCount();
  }catch(e){console.error('[loadArtsTwitter]',e);}
}

async function loadArtsRSS(){
  try{
    const r=await fetch('/api/articles?feed_type=rss&limit=50');
    const d=await r.json();
    totalRss=d.total||0;
    const el=document.getElementById('arts-rss');
    const arts=d.articles||[];
    if(!arts.length){el.innerHTML='<div class="empty"><div class="empty-i">📰</div>Waiting for RSS...</div>';return;}
    el.innerHTML=arts.map(artCardHTML).join('');
    updateTotalCount();
  }catch(e){console.error('[loadArtsRSS]',e);}
}

async function addSrc(){
  const input=document.getElementById('urlIn');
  const url=input.value.trim();
  if(!url)return;
  const btn=document.getElementById('addBtn');
  const errEl=document.getElementById('addErr');
  errEl.style.display='none';
  btn.innerHTML='<span class="spin"></span>';
  btn.disabled=true;
  try{
    const r=await fetch('/api/sources',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const d=await r.json();
    if(!r.ok&&!d.source){
      errEl.textContent=d.error||'Failed to add source';
      errEl.style.display='block';
    }else{
      input.value='';
      await loadSrcs();
      loadArtsTwitter();loadArtsRSS();
    }
  }catch(e){
    errEl.textContent='Network error';
    errEl.style.display='block';
  }finally{
    btn.textContent='Add';
    btn.disabled=false;
  }
}

async function delSrc(id){
  if(!confirm('Remove this source?'))return;
  await fetch('/api/sources/'+id,{method:'DELETE'});
  loadSrcs();
  loadArtsTwitter();loadArtsRSS();
}

function prependToCol(colId,arts){
  const el=document.getElementById(colId);
  const em=el.querySelector('.empty');
  if(em)em.remove();
  el.insertAdjacentHTML('afterbegin',arts.map(artCardHTML).join(''));
}

// Shared article card used by all 3 columns — shows dual timestamps
function artCardHTML(a){
  const st=a.source_title||'Unknown';
  const c=getColor(st);
  const pubDate=parseDate(a.published_at);
  const fetchDate=parseDate(a.created_at);
  return `<div class="art">
    <a class="art-link" href="${esc(a.link||'#')}" target="_blank" rel="noopener noreferrer">${esc(a.title||'Untitled')}</a>
    <div class="art-meta">
      <span class="art-badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${esc(st)}</span>
      ${a.fetch_method?`<span style="font-size:9px;color:var(--muted);opacity:.6">via ${a.fetch_method}</span>`:''}
      ${a.also_found_by?`<span style="font-size:9px;color:var(--green);opacity:.8">✓ also ${a.also_found_by}</span>`:''}
    </div>
    <div class="art-time" style="margin-top:4px">
      ${pubDate?`<div>Published: ${relTime(pubDate)} <span style="opacity:.6">(${fmtTime(pubDate)})</span></div>`:''}
      ${fetchDate?`<div>Fetched: ${relTime(fetchDate)} <span style="opacity:.6">(${fmtTime(fetchDate)})</span></div>`:''}
    </div>
    ${a.description?`<div class="art-desc">${esc(a.description)}</div>`:''}
  </div>`;
}

// Parse SQLite datetime strings — they lack timezone so treat as UTC
function parseDate(s){
  if(!s)return null;
  const d=new Date(s.endsWith('Z')?s:s+'Z');
  return isNaN(d)?null:d;
}

function fmtTime(d){
  if(!d)return'';
  return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
}

function relTime(d){
  if(!d||isNaN(d))return'';
  const s=Math.floor((Date.now()-d)/1000);
  if(s<0)return'just now';
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('addBtn').onclick=addSrc;
document.getElementById('urlIn').onkeydown=e=>{if(e.key==='Enter')addSrc();};

connectWS();
loadSrcs().then(()=>{loadArtsTwitter();loadArtsRSS();});
setInterval(()=>{loadArtsTwitter();loadArtsRSS();},60000);
</script>
</body>
</html>
